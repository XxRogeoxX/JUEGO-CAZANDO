<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="mariokart.jpg" rel="stylesheet">
  <link rel="stylesheet" href="cazando.css" />
  <title>Juego Cazando - Edición Retro</title>
</head>
<body onload="iniciarJuego();">

  <div class="game-shell">
    <div class="sky-objects">
      <div class="cloud cloud-1"><span></span><span></span></div>
      <div class="cloud cloud-2"><span></span><span></span></div>
      <div class="block-icon">?</div>
    </div>
  
    <div class="main-container">
      <h1>JUEGO CAZANDO</h1>
      <p class="author">Autor: Ronald Sánchez</p>

    <div class="decorative-images">
      <img class="decorative-img character" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8' shape-rendering='crispEdges'><rect width='8' height='8' fill='transparent'/><rect x='1' y='0' width='6' height='1' fill='%23d22'/><rect x='1' y='1' width='6' height='1' fill='%23d22'/><rect x='0' y='2' width='8' height='1' fill='%23000'/><rect x='1' y='3' width='2' height='1' fill='%23fcd4a4'/><rect x='5' y='3' width='2' height='1' fill='%23fcd4a4'/><rect x='3' y='3' width='2' height='1' fill='%23f4c542'/><rect x='1' y='4' width='6' height='1' fill='%23753300'/><rect x='1' y='5' width='6' height='1' fill='%231351ac'/><rect x='1' y='6' width='2' height='1' fill='%231351ac'/><rect x='5' y='6' width='2' height='1' fill='%231351ac'/><rect x='2' y='7' width='1' height='1' fill='%23000'/><rect x='5' y='7' width='1' height='1' fill='%23000'/></svg>" alt="Personaje estilo Mario Bros">
      <img class="decorative-img target" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8' shape-rendering='crispEdges'><rect width='8' height='8' fill='%23f4d03f'/><rect x='0' y='0' width='8' height='8' fill='none' stroke='%238c6e1a' stroke-width='1'/><rect x='2' y='1' width='4' height='1' fill='%238c6e1a'/><rect x='3' y='2' width='2' height='1' fill='%23f4d03f'/><rect x='3' y='3' width='2' height='2' fill='%238c6e1a'/><rect x='3' y='4' width='1' height='1' fill='%23f4d03f'/><rect x='3' y='5' width='2' height='1' fill='%238c6e1a'/></svg>" alt="Bloque de pregunta estilo Mario Bros">
    </div>

    <div class="panel">
      <span>PUNTOS:<span id="puntos">0000</span></span>
      <span>TIEMPO:<span id="tiempo">10</span></span>
    </div>

    <div class="canvas-wrapper">
      <canvas id="areaJuego" width="500" height="500"></canvas>
    </div>

    <div class="controles-retro">
      <div class="d-pad">
        <button class="btn-up" onclick="moverArriba();">⬆</button>
        <div class="d-pad-horizontal">
          <button class="btn-left" onclick="moverIzquierda();">⬅</button>
          <button class="btn-down" onclick="moverAbajo();">⬇</button>
          <button class="btn-right" onclick="moverDerecha();">➡</button>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-reset" onclick="reiniciarJuego();">REINICIAR 🔄</button>
    </div>

    <p id="mensaje"></p>
    </div>
  </div>

  <script src="cazando.js"></script>
  <script src="utils.js"></script>

</body>
</html>
